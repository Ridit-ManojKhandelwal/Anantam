<!-- splash.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Splash Screen</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: black;
      }
      .splash-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #fff;
      }
      .splash-logo {
        width: 200px;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="splash-container">
      <img src="splash-logo.png" alt="Splash Logo" class="splash-logo" />
    </div>
  </body>
</html>
